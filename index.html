<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hilmy">
<meta name="theme-color" content="#FFD600">
<title>Hilmy Mahfuzra · Product Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--y:#FFD600;--yd:#C9A800;--bg:#0f0f0f}
html,body{height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(255,214,0,.07) 0%,transparent 70%);pointer-events:none}
.scene{width:340px;height:598px;perspective:1200px;cursor:pointer}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1)}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden;box-shadow:0 30px 70px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.07)}
.front{background:linear-gradient(155deg,#1c1800 0%,#0d0d0d 55%,#181200 100%)}
.back{transform:rotateY(180deg);background:linear-gradient(155deg,#1c1800 0%,#0d0d0d 60%)}
.accent-bar{height:4px;background:linear-gradient(90deg,var(--yd),var(--y) 50%,var(--yd))}
.front-inner{display:flex;flex-direction:column;align-items:center;padding:24px 22px 18px;height:calc(100% - 4px)}
.avatar{width:80px;height:80px;border-radius:50%;border:3px solid var(--y);box-shadow:0 0 0 6px rgba(255,214,0,.1),0 8px 24px rgba(0,0,0,.5);overflow:hidden;flex-shrink:0;margin-bottom:12px;animation:pulse 3s ease-in-out infinite}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:center top}
.name{color:#fff;font-size:21px;font-weight:700;letter-spacing:.4px;text-align:center;margin-bottom:4px}
.role{color:var(--y);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;text-align:center;margin-bottom:18px;font-family:monospace;opacity:.85}
.divider{width:36px;height:2px;background:linear-gradient(90deg,transparent,var(--y),transparent);margin-bottom:18px}
.contacts{width:100%;display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.contact-row{display:flex;align-items:center;gap:10px;text-decoration:none;color:#ccc;font-size:13px;padding:9px 12px;border-radius:11px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);transition:all .2s;font-family:monospace}
.contact-row:active{background:rgba(255,214,0,.1);border-color:rgba(255,214,0,.35);color:#fff}
.ci{width:28px;height:28px;background:rgba(255,214,0,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci svg{width:14px;height:14px;fill:var(--y)}
.socials{display:flex;gap:10px;margin-bottom:18px}
.sb{width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .2s}
.sb:active{background:rgba(255,214,0,.15);border-color:var(--y)}
.sb svg{width:18px;height:18px;fill:#bbb}
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:7px;margin-top:auto}
.qr-box{padding:8px;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.qr-box img{width:108px;height:108px;display:block}
.qr-label{color:rgba(255,255,255,.35);font-size:10px;letter-spacing:1.8px;text-transform:uppercase;font-family:monospace}
.hint{position:absolute;bottom:14px;right:14px;color:rgba(255,255,255,.22);font-size:10px;display:flex;align-items:center;gap:4px;font-family:monospace;letter-spacing:1px}
.back-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100% - 4px);padding:36px 24px;gap:20px}

.logo-circle svg{width:78px;height:78px}



.back-detail div:first-child{color:rgba(255,255,255,.28);font-size:10px;font-family:monospace;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.back-detail div:last-child{color:var(--y);font-size:15px;letter-spacing:.5px}




.gyro-box h3{color:#fff;font-size:18px;margin-bottom:10px}
.gyro-box p{color:rgba(255,255,255,.45);font-size:13px;margin-bottom:24px;line-height:1.55}


.ios-banner{position:fixed;bottom:0;left:0;right:0;background:#1a1600;border-top:1px solid rgba(255,214,0,.25);padding:14px 18px;display:flex;align-items:center;gap:12px;z-index:100;transform:translateY(100%);transition:transform .4s ease}
.ios-banner.show{transform:translateY(0)}
.ios-banner-text{flex:1;color:rgba(255,255,255,.7);font-size:12px;line-height:1.45;font-family:monospace}
.ios-banner-text b{color:var(--y)}
.ios-x{color:rgba(255,255,255,.3);font-size:20px;cursor:pointer;padding:4px 6px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 6px rgba(255,214,0,.1)}50%{box-shadow:0 0 0 10px rgba(255,214,0,.2)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px) scale(.95)}to{opacity:1;transform:none}}
.scene{animation:fadeUp .5s cubic-bezier(.4,0,.2,1) both}
</style>
</head>
